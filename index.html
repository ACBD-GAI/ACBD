<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>INVENTORY SYSTEM</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#eef2f7;
    font-family:Arial;
}

.card{

    background:white;
    padding:40px;
    border-radius:20px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,.15);

}

h2{
    color:#1976d2;
}


button{

    margin-top:20px;

    padding:15px 30px;

    border:none;

    border-radius:12px;

    background:#1976d2;

    color:white;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

}


button:hover{

    background:#1565c0;

}


</style>

</head>


<body>


<div class="card">


<h2>
<img src="https://drive.google.com/thumbnail?id=1U9kmQ7qummOCpVppdLtmVaugMuzLYUWQ&sz=w200"
style="
width:60px;
height:60px;
object-fit:contain;
vertical-align:middle;
margin-right:10px;
">
ACEBEDO OPTICAL
</h2>


<p>
Welcome
</p>


<select id="systemSelect">

<option value="">
SELECT SYSTEM
</option>

<option value="inventory">
INVENTORY SCANNER
</option>

<option value="system2">
SECOND SYSTEM
</option>

</select>


<button onclick="openSystem()">
OPEN
</button>


</div>



<script>

function openSystem(){

const choice =
document.getElementById("systemSelect").value;


if(choice === "inventory"){

sessionStorage.setItem("fromGateway","YES");

window.location.href =
"https://acbd-gai.github.io/SOLD-BAC/";

}


else if(choice === "system2"){


window.location.href =
"https://acbd-gai.github.io/ACBDCAS/";


}


else{

alert("Please select a system");

}

}

</script>


</body>

</html>
