<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ACEBEDO OPTICAL</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#eef2f7;
    font-family:Arial;
}

.card{

    background:white;
    padding:40px;
    border-radius:20px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,.15);

}

h2{
    color:#1976d2;
}


button{

    margin-top:20px;

    padding:15px 30px;

    border:none;

    border-radius:12px;

    background:#1976d2;

    color:white;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

}


button:hover{

    background:#1565c0;

}

    /* DROPDOWN STYLE */

select{

    width:280px;

    padding:15px 18px;

    margin-top:15px;

    border:none;

    border-radius:15px;

    background:
    linear-gradient(135deg,#e3f2fd,#ffffff);

    color:#1976d2;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    outline:none;

    box-shadow:
    0 5px 15px rgba(0,0,0,0.12);

    appearance:none;

    background-image:
    linear-gradient(45deg, transparent 50%, #1976d2 50%),
    linear-gradient(135deg, #1976d2 50%, transparent 50%);

    background-position:
    calc(100% - 20px) 50%,
    calc(100% - 15px) 50%;

    background-size:
    6px 6px,
    6px 6px;

    background-repeat:no-repeat;

    transition:.3s;

}


select:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(25,118,210,.25);

}


select:focus{

    box-shadow:
    0 0 0 4px rgba(33,150,243,.25);

}


</style>

</head>


<body>


<div class="card">


<h2>
<img src="https://drive.google.com/thumbnail?id=1U9kmQ7qummOCpVppdLtmVaugMuzLYUWQ&sz=w200"
style="
width:60px;
height:60px;
object-fit:contain;
vertical-align:middle;
margin-right:10px;
">
ACEBEDO OPTICAL
</h2>


<p>
Welcome
</p>


<select id="systemSelect">

<option value="">
🏢 SELECT BRANCH
</option>

<option value="BAC">
BACOLOD
</option>

<option value="BAC">
🏬 BACOLOD BRANCH
</option>

<option value="CAS">
🏬 CASA BRANCH
</option>


<button onclick="openSystem()">
OPEN
</button>


</div>



<script>

function openSystem(){

const choice =
document.getElementById("systemSelect").value;


if(choice === "BAC"){

sessionStorage.setItem("fromGateway","YES");

window.location.href =
"https://acbd-gai.github.io/SOLD-BAC/";

}


else if(choice === "CAS"){


window.location.href =
"https://acbd-gai.github.io/ACBDCAS/";


}


else{

alert("Please select a system");

}

}

</script>


</body>

</html>
